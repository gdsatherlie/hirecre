<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="dashboard/styles.css" />
  <title>HireCRE</title>
</head>
<body>
  <header class="header">
    <div class="title-group">
      <div class="badge">Preview</div>
      <h1>HireCRE dashboards</h1>
      <p>Sample layouts for employer and candidate experiences.</p>
    </div>
  </header>
  <main class="layout">
    <section class="card">
      <h2>Employer dashboard</h2>
      <p>Post and manage roles with quick CTA buttons and example list items.</p>
      <div class="actions">
        <a class="button" href="/dashboard/employer/">Open employer view</a>
      </div>
    </section>

    <section class="card">
      <h2>Candidate dashboard</h2>
      <p>See saved jobs and applications in a clean, card-based layout.</p>
      <div class="actions">
        <a class="button" href="/dashboard/candidate/">Open candidate view</a>
      </div>
    </section>
  </main>
</body>
</html>
